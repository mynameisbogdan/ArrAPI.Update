name: build

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths-ignore:
      - '**renovate.json5?'
      - 'docker-compose.yml'
      - 'Makefile'
      - 'LICENSE'
      - '**.md'

  pull_request:
    branches:
      - 'main'
    paths-ignore:
      - '**renovate.json5?'
      - 'docker-compose.yml'
      - 'Makefile'
      - 'LICENSE'
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

env:
  APP_VERSION: 0.1.0

permissions:
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: ${{ ! github.event.repository.private }}
    outputs:
      version: ${{ steps.variables.outputs.version }}
      branch: ${{ steps.variables.outputs.branch }}
    steps:
      - name: Set environment variables
        id: variables
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        shell: bash
        run: |
          echo "version=${{ env.APP_VERSION }}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH_NAME//[\/.]/-}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    name: Build Docker Image
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      BRANCH: ${{ needs.prepare.outputs.branch }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: |
            amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/arrapi-update
          labels: |
            org.opencontainers.image.authors=${{ github.repository_owner }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
          tags: |
            type=raw,value=${{ env.VERSION }},priority=800,prefix=v
            type=raw,value=${{ env.APP_VERSION }},priority=700,prefix=v
            type=ref,event=branch
          flavor: |
            latest=false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate build configuration
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          call: check

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: |
            linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          provenance: false
          build-args: |
            VERSION=${{ env.VERSION }}
            BRANCH=${{ env.BRANCH }}
